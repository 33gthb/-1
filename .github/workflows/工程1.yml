# .github/workflows/hot-monitor.yml
name: Daily Hot News Monitor

on:
  schedule:
    - cron: '30 0 * * *'      # 每天 8:30 北京时间
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行监控脚本
        env:
          SEND_KEY: ${{ secrets.SEND_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python 工程1.py   # 这里改成你的实际文件名
